<mat-sidenav-container class="section-layout">
  <mat-sidenav
    mode="side"
    opened
    class="ue-list-sidenav">
    <mat-nav-list>

      @for (section of sections; track section.code) {
        <mat-list-item
          (click)="selectSection(section)"
          [activated]="section === selectedSection"
          class="section-item">
          {{ section.nom }}
        </mat-list-item>
      }
    </mat-nav-list>

    <mat-divider></mat-divider>
    @if (ues.length === 0) {
      <p class="ue-empty">Aucun cours disponible</p>
    } @else {
      <mat-list class="ue-list-dense">
        @for (ue of ues; track ue.code) {
          <mat-list-item
            (click)="selectUe(ue)"
            [activated]="ue === selectedUe"
            class="ue-item">
            <mat-icon>folder</mat-icon> {{ ue.nom }}
          </mat-list-item>
        }
      </mat-list>
    }
  </mat-sidenav>
  <mat-sidenav-content class="ue-detail-content">

    @if (selectedUe) {
      <app-eu-detail [ue]="selectedUe"></app-eu-detail>
    } @else {
      <p class="placeholder">
        Sélectionnez une UE pour voir les détails
      </p>
    }

  </mat-sidenav-content>

</mat-sidenav-container>
