<div class="page-container">
  @if (isLoading()) {
    <mat-progress-bar mode="indeterminate" />
  }

  @let profile = user();
  @if (profile) {
    <mat-card class="profile-card">

      <!-- En-tête centré avec avatar -->
      <div class="profile-header">
        <div class="avatar-circle">
          <mat-icon>person</mat-icon>
        </div>
        <h2 class="profile-name">{{ profile.prenom }} {{ profile.nom }}</h2>
        <span class="profile-username">{{ profile.username }}</span>
      </div>

      <mat-divider />

      <!-- Champs du profil -->
      <mat-card-content>
        <div class="profile-field">
          <mat-icon>person</mat-icon>
          <div>
            <div class="field-label">Prénom</div>
            <div class="field-value">{{ profile.prenom }}</div>
          </div>
        </div>
        <mat-divider />
        <div class="profile-field">
          <mat-icon>badge</mat-icon>
          <div>
            <div class="field-label">Nom</div>
            <div class="field-value">{{ profile.nom }}</div>
          </div>
        </div>
        <mat-divider />
        <div class="profile-field">
          <mat-icon>email</mat-icon>
          <div>
            <div class="field-label">Email</div>
            <div class="field-value">{{ profile.email }}</div>
          </div>
        </div>
        <mat-divider />
        <div class="profile-field">
          <mat-icon>fingerprint</mat-icon>
          <div>
            <div class="field-label">Identifiant</div>
            <div class="field-value">{{ profile.username }}</div>
          </div>
        </div>
      </mat-card-content>
    </mat-card>
  }
</div>
