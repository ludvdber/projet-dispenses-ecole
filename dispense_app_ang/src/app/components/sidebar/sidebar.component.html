<mat-sidenav-container class="sidenav-container">
  <mat-sidenav #drawer class="sidenav" fixedInViewport [opened]="false" [mode]="'over'">

    <mat-toolbar class="drawer-header">Navigation</mat-toolbar>

    <mat-nav-list>
      <a mat-list-item routerLink="/home" (click)="drawer.close()">
        <mat-icon matListItemIcon>home</mat-icon>
        <span>Accueil</span>
      </a>
      <a mat-list-item routerLink="/ues" (click)="drawer.close()">
        <mat-icon matListItemIcon>menu_book</mat-icon>
        <span>Sections &amp; UE</span>
      </a>

      <mat-divider></mat-divider>

      <a mat-list-item routerLink="/profile" (click)="drawer.close()">
        <mat-icon matListItemIcon>person</mat-icon>
        <span>Profil</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <app-menu />
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
