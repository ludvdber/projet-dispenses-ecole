spring:
  application:
    name: projetWebPid2526
  output:
    ansi:
      enabled: always
  main:
    banner-mode: off
  messages:
    basename:
    - messages
    encoding: UTF-8
  profiles:
    active:
     - dev
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
app:
  cors:
    allowed-origins: http://localhost:4200
---
spring:
  config:
    activate:
      on-profile:
      - testU
  jpa:
    hibernate:
      ddl-auto: create-drop
  sql:
    init:
      mode: never   
      encoding: UTF-8
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  http://localhost:8084/realms/DISP
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
          public-key-location: classpath:certificats/keycloak-public-cert.pem

---
spring:
  config:
    activate:
      on-profile:
      - dev
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  datasource:
    url: jdbc:h2:~/PID_DB/pidDB2526Ludovic
    username: sa
    password: 
  sql:
    init:
      mode: always
      encoding: UTF-8
      platform: h2
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:  http://localhost:8084/realms/DISP
          jwk-set-uri: ${spring.security.oauth2.resourceserver.jwt.issuer-uri}/protocol/openid-connect/certs
          public-key-location: classpath:certificats/keycloak-public-cert.pem

app:
  upload:
    dir: uploads
    max-size: 5242880

server:
  port: 9090
logging:
  pattern:
    console: "%d{HH:mm:ss} %clr(%-5level) [%thread] %logger{36} : %msg%n"
  level:
    '[org.isfce.pid.controller]': debug
    '[org.hibernate.SQL]': debug
    '[org.hibernate.type.descriptor.sql.BasicBinder]': trace
management:
  endpoints:
    web:
      base-path: /actuator #défaut /actuator
      exposure:
        include:
        - health
        - mappings
        - info
        - env
  info:
    java:
      enabled: true
    os:
      enabled: true
    process:
      enabled: true
    env:
      enabled: true
info:
  app:
    name: projetWebPid2526
    version: 0.0.1
    description: gestion des dispenses